# 与 deploy_mujoco_minic.py + pm01_mujoco_minic_python.yaml 同一条「观测/动作/PD/锚点对齐」逻辑；
# 仅策略格式不同：本文件须 policy_file 指向与 .pt 等价的 .onnx（onnx_policy_file 可显式覆盖）。
# policy_file: "src/pm01_deploy/config/policy/minic/dance1_subject1.onnx"
# policy_file: "src/pm01_deploy/config/policy/minic/dance1_subject1.onnx"
onnx_policy_file: "src/pm01_deploy/config/policy/minic/walk.onnx"

# motion_file_path: "src/pm01_deploy/config/minic_motion_data/dance1_subject1.npz"
motion_file_path: "src/pm01_deploy/config/minic_motion_data/walk.npz"
anchor_body_name: "LINK_TORSO_YAW"
motion_body_index: 3
anchor_quat_from_base_waist: true
base_link_name: "LINK_BASE"
waist_yaw_joint_name: "J12_WAIST_YAW"

robot_xml_path: "/home/ubuntu/workspace/pm01/deploy/pm01_deploy/src/pm01_deploy/resource/pm_v2.xml"

get_info: false

# use_gui: true 时使用与 MuJoCo 官方 simulate 相同的左栏：Run/Pause、Reset、Rendering、Option、Real-time 等
use_gui: true
# GUI 时与墙钟约 1:1（用 d->time 对齐 sleepUntil）；为 false 则全速算（与以前「加速」类似）
realtime_sync: true
# 仅 GUI 时：>0 则墙钟运行超过该秒数后自动退出；0 或注释掉则只到关窗口才结束
simulation_duration: 600
# 积分步长(秒), 与 pm01_mujoco_minic / deploy_mujoco_minic.py 一致: 0.001 -> 每仿真秒 1000 次 mj_step
simulation_dt: 0.001
# 与 Python control_decimation 一致: 20 -> 每 20 个仿真步跑一次策略, 1/(0.001*20)=50 Hz
control_decimation: 20
# 若 .npz 无 fps 字段，MotionLoader 用下列作为回退；与 50Hz 控制一致
motion_fps: 50
# 与 deploy_mujoco_minic.py 中硬编码 129/24 对齐（可在 YAML 覆盖）
num_observations: 129
num_actions: 24

# Scales
observation_scale_base_ang_vel: 1.0
observation_scale_joint_pos: 1.0
observation_scale_joint_vel: 1.0
action_scale: 1.0

# joint control parameters
default_joint_pos: [-0.06, 0.0, 0.0, 0.12, -0.06, 0.0,
                    -0.06, 0.0, 0.0, 0.12, -0.06, 0.0,
                    0.0,
                    0.0,  0.15,  0.0, -0.25, 0.0,
                    0.0, -0.15,  0.0, -0.25, 0.0,
                    0.0]
# "J00_HIP_PITCH_L" ... 关节名见 Python/机器人 URDF

joint_kp: [178.5, 178.5, 26.4, 178.5, 26.4, 26.4,
           178.5, 178.5, 26.4, 178.5, 26.4, 26.4,
           26.4,
           26.4, 26.4, 26.4, 26.4, 26.4,
           26.4, 26.4, 26.4, 26.4, 26.4,
           26.4]


joint_kd: [11.4, 11.4, 1.69, 11.4, 1.69, 1.69,
           11.4, 11.4, 1.69, 11.4, 1.69, 1.69,
           1.69,
           1.69, 1.69, 1.69, 1.69, 1.69,
           1.69, 1.69, 1.69, 1.69, 1.69,
           1.69]